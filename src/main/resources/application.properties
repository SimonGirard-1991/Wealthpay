spring.application.name=wealthpay
spring.threads.virtual.enabled=true
account-event.snapshot.threshold=${ACCOUNT_SNAPSHOT_THRESHOLD:100}
# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jooq.sql-dialect=POSTGRES
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/account
spring.flyway.default-schema=account
spring.flyway.schemas=account
logging.level.org.flywaydb=INFO
# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.consumer.group-id=wealthpay-account-projector
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=io.confluent.kafka.serializers.KafkaAvroDeserializer
spring.kafka.consumer.fetch-max-wait=100ms
spring.kafka.listener.concurrency=3
spring.kafka.listener.observation-enabled=true
spring.kafka.properties.schema.registry.url=${SCHEMA_REGISTRY_URL}
spring.kafka.properties.specific.avro.reader=false
kafka.topic.account.outbox=wealthpay.AccountEvent
kafka.consumer.retry.initial-interval-ms=1000
kafka.consumer.retry.multiplier=2.0
# Observability
management.endpoints.web.exposure.include=health,prometheus
management.observations.annotations.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles-histogram.account.load=true
# Outbox cleanup
# IMPORTANT: retention-days is ONLY used by the Spring fallback scheduler.
# In production (pg_cron), retention is controlled by the function's DEFAULT
# parameter (3 days, set in V16). To change it, create a new migration that
# runs CREATE OR REPLACE FUNCTION with the new DEFAULT value.
outbox.cleanup.retention-days=${OUTBOX_CLEANUP_RETENTION_DAYS:3}
outbox.cleanup.spring-execution.enabled=${OUTBOX_CLEANUP_SPRING_EXECUTION:false}
