services:
  postgres:
    build:
      context: ./docker/postgres
    container_name: wealthpay-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: wealthpay
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "max_wal_senders=12"
      - "-c"
      - "shared_preload_libraries=pg_cron,pg_stat_statements"
      - "-c"
      - "cron.database_name=wealthpay"
      # track_io_timing is required for pg_stat_statements I/O columns
      # (blk_read_time, blk_write_time, temp_blk_read_time, temp_blk_write_time)
      # to carry non-zero values. Without it they silently return 0.
      # On modern Linux with TSC clocksource this is effectively free; on
      # non-TSC clocksources (some virtualization, older kernels) it can be
      # measurably expensive. For non-local environments, run `pg_test_timing`
      # first to confirm overhead is acceptable before copying this line.
      - "-c"
      - "track_io_timing=on"
      # track_wal_io_timing (PG14+) is a SEPARATE GUC controlling only the
      # pg_stat_wal.wal_write_time and pg_stat_wal.wal_sync_time columns.
      # It is NOT covered by track_io_timing despite the similar name. Our
      # sql-exporter's pg_wal_stat_{write,sync}_time_milliseconds_total
      # metrics (see docker/sql-exporter/wal-io.collector.yml) are
      # unconditionally 0 without this, making any WAL-fsync-latency alert
      # or dashboard silently useless. Same clock-source caveat as
      # track_io_timing above — the overhead is bounded by gettimeofday()
      # cost on WAL write/sync operations. Re-evaluate for non-local
      # environments against the production WAL rate.
      - "-c"
      - "track_wal_io_timing=on"
      # These match the PG16 defaults as of 2026; restated here so a future
      # upstream change doesn't silently move our pg_stat_statements budget.
      # Not "tuned" — just pinned.
      - "-c"
      - "pg_stat_statements.max=5000"
      - "-c"
      - "pg_stat_statements.track=top"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d wealthpay" ]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-bootstrap:
    image: postgres:16
    container_name: wealthpay-postgres-bootstrap
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: password
      POSTGRES_USER: user
      POSTGRES_DB: wealthpay
    volumes:
      - ./docker/postgres/bootstrap:/bootstrap:ro
    restart: "no"
    # CONTRACT: this service is a barrier that other services (e.g.,
    # postgres-exporter) wait on via `service_completed_successfully`.
    # Every bootstrap SQL file MUST be idempotent (safe on re-runs over
    # an existing pg_data volume) and MUST propagate failures via the
    # `set -Eeuo pipefail` guard + psql's `ON_ERROR_STOP=1`. Breaking
    # this contract will silently break any downstream dependency.
    entrypoint:
      - "bash"
      - "-lc"
      - |
        set -Eeuo pipefail
        for f in /bootstrap/*.sql; do
          [ -e "$$f" ] || continue
          echo "Running $$f"
          psql -h postgres -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -v ON_ERROR_STOP=1 -f "$$f"
        done

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.19.1
    container_name: wealthpay-postgres-exporter
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      postgres-bootstrap:
        condition: service_completed_successfully
    ports:
      - "9187:9187"
    # Opt-in to the stat_statements collector. Upstream marks it
    # `defaultDisabled` because it can be expensive on busy servers;
    # enabling here so the DB-side cost we pay (shared_preload_libraries,
    # hook overhead) actually surfaces as Prometheus metrics.
    #
    # --collector.stat_statements.include_query exposes the normalized
    # query text as a metric label. Safe for this local single-DB stack
    # (exporter limit=100, query_length=120 chars). DO NOT enable in a
    # production or multi-tenant deployment without explicit cardinality
    # review — the label explodes per unique normalized query.
    command:
      - "--collector.stat_statements"
      - "--collector.stat_statements.include_query"
    # LOCAL-ONLY CREDENTIALS. In a non-local deployment, route through
    # Docker/K8s secrets and use DATA_SOURCE_PASS_FILE / DATA_SOURCE_URI_FILE.
    # Single-DB scrape: we intentionally do NOT enable auto-discovery, so
    # PG_EXPORTER_EXCLUDE_DATABASES is not set — it only applies when
    # PG_EXPORTER_AUTO_DISCOVER_DATABASES=true.
    environment:
      DATA_SOURCE_URI: "postgres:5432/wealthpay?sslmode=disable"
      DATA_SOURCE_USER: monitoring
      DATA_SOURCE_PASS: monitoring

  sql-exporter:
    # Gap-filler exporter for queries postgres_exporter's built-in
    # collectors don't cover (pg_stat_wal, pg_stat_io). Required because
    # postgres_exporter deprecated --extend.query-path in v0.13.0 (2023-06)
    # and explicitly redirects custom-query use cases to sql_exporter.
    #
    # Scope is deliberately narrow — see docker/sql-exporter/wal-io.collector.yml
    # for the two queries and their cardinality budget. Do not grow this
    # service into a general-purpose SQL exporter.
    image: burningalchemist/sql_exporter:0.22.3
    container_name: wealthpay-sql-exporter
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      postgres-bootstrap:
        condition: service_completed_successfully
    ports:
      # Host-exposed for local `curl localhost:9399/metrics` debugging.
      # Prometheus scrapes via the compose network on the same port.
      - "9399:9399"
    volumes:
      - ./docker/sql-exporter:/etc/sql_exporter:ro
    command:
      - "-config.file=/etc/sql_exporter/sql_exporter.yml"
      # Default listen is :9399, pinned explicitly so the port stays in
      # lockstep with the `ports:` and Prometheus scrape job.
      - "-web.listen-address=:9399"

  kafka-1:
    image: confluentinc/cp-kafka:8.1.1
    container_name: wealthpay-kafka-1
    hostname: kafka-1
    restart: unless-stopped
    ports:
      - "9092:9092"
    volumes:
      - kafka_1_data:/var/lib/kafka/data
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093

      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-1:29092,HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2

      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2

      KAFKA_LOG_RETENTION_HOURS: 24

      CLUSTER_ID: PN_eINCLQI2SU8xDqJEZ7w

  kafka-2:
    image: confluentinc/cp-kafka:8.1.1
    container_name: wealthpay-kafka-2
    hostname: kafka-2
    restart: unless-stopped
    ports:
      - "9093:9092"
    volumes:
      - kafka_2_data:/var/lib/kafka/data
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093

      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-2:29092,HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2

      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2

      KAFKA_LOG_RETENTION_HOURS: 24

      CLUSTER_ID: PN_eINCLQI2SU8xDqJEZ7w

  kafka-3:
    image: confluentinc/cp-kafka:8.1.1
    container_name: wealthpay-kafka-3
    hostname: kafka-3
    restart: unless-stopped
    ports:
      - "9094:9092"
    volumes:
      - kafka_3_data:/var/lib/kafka/data
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093

      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-3:29092,HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2

      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2

      KAFKA_LOG_RETENTION_HOURS: 24

      CLUSTER_ID: PN_eINCLQI2SU8xDqJEZ7w

  schema-registry:
    image: confluentinc/cp-schema-registry:8.1.1
    container_name: wealthpay-schema-registry
    restart: unless-stopped
    ports:
      - "8081:8081"
    healthcheck:
      test: curl -f http://localhost:8081/ || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'kafka-1:29092,kafka-2:29092,kafka-3:29092'
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy

  kafka-connect:
    build:
      context: docker/kafka-connect
    container_name: wealthpay-kafka-connect
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    ports:
      - "8083:8083"
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:8083/connectors?expand=status | grep -q '\"state\":\"PAUSED\"\\|\"state\":\"FAILED\"\\|\"state\":\"UNASSIGNED\"' && exit 1 || exit 0" ]
      interval: 10s
      timeout: 5s
      retries: 30
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
      CONNECT_GROUP_ID: wealthpay-connect
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect

      CONNECT_CONFIG_STORAGE_TOPIC: connect_configs
      CONNECT_OFFSET_STORAGE_TOPIC: connect_offsets
      CONNECT_STATUS_STORAGE_TOPIC: connect_statuses

      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 3
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 3
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 3

      CONNECT_KEY_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_KEY_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CONNECT_VALUE_CONVERTER: io.confluent.connect.avro.AvroConverter
      CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081

      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components

  kafka-ui:
    image: kafbat/kafka-ui:v1.4.2
    container_name: kafka-ui
    ports:
      - "8082:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: PN_eINCLQI2SU8xDqJEZ7w
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka-connect:8083
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
      - schema-registry

  prometheus:
    image: prom/prometheus:v3.10.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-lifecycle'
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./docker/prometheus/rules:/etc/prometheus/rules
      - prometheus_data:/prometheus

  alertmanager:
    image: prom/alertmanager:v0.31.1
    container_name: alertmanager
    restart: unless-stopped
    ports:
      - "9095:9093"
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    volumes:
      - ./docker/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    depends_on:
      alertmanager-discord:
        condition: service_healthy

  alertmanager-discord:
    build:
      context: docker/alertmanager-discord
    container_name: alertmanager-discord
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:9096/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      DISCORD_WEBHOOK_CRITICAL_URL: ${DISCORD_WEBHOOK_CRITICAL_URL}

  grafana:
    image: grafana/grafana:12.3
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./docker/grafana/grafana.yml:/etc/grafana/provisioning/datasources/datasource.yaml
      - ./docker/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: password
    depends_on:
      - prometheus

volumes:
  pg_data:
  kafka_1_data:
  kafka_2_data:
  kafka_3_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:
