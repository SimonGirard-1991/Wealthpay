<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="aGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#34d399"/></marker>
    <marker id="aRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#f87171"/></marker>
    <marker id="aBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#38bdf8"/></marker>
  </defs>

  <rect width="960" height="360" fill="url(#bg)"/>
  <text x="40" y="50" font-size="24" font-weight="700" fill="#38bdf8">Account Lifecycle</text>
  <line x1="40" y1="64" x2="920" y2="64" stroke="#334155" stroke-width="1"/>

  <text x="445" y="112" font-size="12.5" fill="#7dd3fc" text-anchor="middle">Credit &#183; Debit &#183; Reserve &#183; Capture &#183; Cancel</text>
  <path d="M 400 180 C 378 124, 512 124, 490 180" fill="none" stroke="#38bdf8" stroke-width="2" marker-end="url(#aBlue)"/>

  <circle cx="110" cy="226" r="30" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
  <circle cx="110" cy="226" r="23" fill="none" stroke="#64748b" stroke-width="2"/>
  <text x="110" y="230" font-size="13" font-weight="600" fill="#cbd5e1" text-anchor="middle">start</text>

  <line x1="142" y1="226" x2="314" y2="226" stroke="#34d399" stroke-width="2.5" marker-end="url(#aGreen)"/>
  <text x="228" y="214" font-size="14" font-weight="700" fill="#6ee7b7" text-anchor="middle">OpenAccount</text>
  <text x="228" y="246" font-size="11.5" fill="#94a3b8" text-anchor="middle">initialBalance &#8805; 0</text>

  <line x1="572" y1="226" x2="724" y2="226" stroke="#f87171" stroke-width="2.5" marker-end="url(#aRed)"/>
  <text x="648" y="214" font-size="14" font-weight="700" fill="#fca5a5" text-anchor="middle">CloseAccount</text>
  <text x="648" y="246" font-size="11.5" fill="#94a3b8" text-anchor="middle">balance = 0 &#183; no holds</text>

  <rect x="320" y="180" width="252" height="92" rx="14" fill="#064e3b" stroke="#34d399" stroke-width="2.5" filter="url(#sh)"/>
  <text x="446" y="216" font-size="22" font-weight="700" fill="#6ee7b7" text-anchor="middle">OPENED</text>
  <text x="446" y="240" font-size="12" fill="#a7f3d0" text-anchor="middle">accepts credit, debit, reserve,</text>
  <text x="446" y="257" font-size="12" fill="#a7f3d0" text-anchor="middle">capture &amp; cancel</text>

  <rect x="730" y="180" width="200" height="92" rx="14" fill="#450a0a" stroke="#f87171" stroke-width="2.5" filter="url(#sh)"/>
  <text x="830" y="216" font-size="22" font-weight="700" fill="#fca5a5" text-anchor="middle">CLOSED</text>
  <text x="830" y="240" font-size="12" fill="#fecaca" text-anchor="middle">terminal &#8212; no further</text>
  <text x="830" y="257" font-size="12" fill="#fecaca" text-anchor="middle">commands accepted</text>

  <text x="40" y="332" font-size="12.5" fill="#64748b">A command that breaks a rule is rejected &#8212; no event is recorded and the account is left unchanged.</text>
</svg>
