<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="aGray" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/></marker>
    <marker id="aGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#34d399"/></marker>
    <marker id="aAmber" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#fbbf24"/></marker>
    <marker id="aBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#60a5fa"/></marker>
    <marker id="aRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#f87171"/></marker>
  </defs>

  <rect width="1200" height="540" fill="url(#bg)"/>
  <text x="40" y="50" font-size="24" font-weight="700" fill="#38bdf8">Components</text>
  <line x1="40" y1="64" x2="1160" y2="64" stroke="#334155" stroke-width="1"/>

  <!-- aggregate (called aside, no I/O) -->
  <rect x="385" y="84" width="180" height="48" rx="11" fill="#312e81" stroke="#a5b4fc" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="475" y="105" font-size="12.5" font-weight="700" fill="#e0e7ff" text-anchor="middle">Account aggregate</text>
  <text x="475" y="122" font-size="10.5" fill="#c7d2fe" text-anchor="middle">domain &#183; no I/O</text>

  <!-- write row -->
  <rect x="40" y="160" width="120" height="60" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="100" y="188" font-size="14" font-weight="700" fill="#bfdbfe" text-anchor="middle">Client</text>
  <text x="100" y="206" font-size="10.5" fill="#93c5fd" text-anchor="middle">REST</text>

  <rect x="210" y="160" width="160" height="60" rx="10" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
  <text x="290" y="186" font-size="13" font-weight="700" fill="#bfdbfe" text-anchor="middle">REST Controllers</text>
  <text x="290" y="204" font-size="10.5" fill="#94a3b8" text-anchor="middle">infrastructure &#183; web</text>

  <rect x="420" y="150" width="190" height="80" rx="10" fill="#1e293b" stroke="#818cf8" stroke-width="2"/>
  <text x="515" y="184" font-size="13" font-weight="700" fill="#c7d2fe" text-anchor="middle">Application layer</text>
  <text x="515" y="203" font-size="10.5" fill="#94a3b8" text-anchor="middle">use cases + balance reader</text>

  <rect x="700" y="150" width="200" height="80" rx="10" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
  <text x="800" y="180" font-size="13" font-weight="700" fill="#6ee7b7" text-anchor="middle">PostgreSQL</text>
  <text x="800" y="199" font-size="10.5" fill="#a7f3d0" text-anchor="middle">event_store + outbox</text>
  <text x="800" y="216" font-size="9.5" fill="#64748b" text-anchor="middle">same TX &#183; optimistic lock</text>

  <!-- write arrows -->
  <line x1="160" y1="190" x2="206" y2="190" stroke="#94a3b8" stroke-width="2" marker-end="url(#aGray)"/>
  <line x1="370" y1="190" x2="416" y2="190" stroke="#94a3b8" stroke-width="2" marker-end="url(#aGray)"/>
  <line x1="515" y1="150" x2="500" y2="136" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#aGray)"/>
  <text x="560" y="120" font-size="10.5" fill="#94a3b8">handle &#8594; events</text>
  <line x1="610" y1="190" x2="696" y2="190" stroke="#94a3b8" stroke-width="2" marker-end="url(#aGray)"/>
  <text x="655" y="180" font-size="10.5" fill="#94a3b8" text-anchor="middle">append</text>

  <!-- down to projection -->
  <line x1="800" y1="230" x2="800" y2="356" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#aAmber)"/>
  <text x="814" y="296" font-size="11" fill="#fcd34d">WAL / CDC</text>

  <!-- projection row (right to left) -->
  <rect x="700" y="360" width="200" height="62" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="800" y="387" font-size="13" font-weight="700" fill="#fde68a" text-anchor="middle">Debezium CDC</text>
  <text x="800" y="405" font-size="10.5" fill="#94a3b8" text-anchor="middle">reads WAL</text>

  <rect x="470" y="360" width="190" height="62" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="565" y="387" font-size="13" font-weight="700" fill="#fde68a" text-anchor="middle">Kafka</text>
  <text x="565" y="405" font-size="10.5" fill="#94a3b8" text-anchor="middle">AccountEvent</text>

  <rect x="240" y="354" width="200" height="74" rx="10" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
  <text x="340" y="382" font-size="13" font-weight="700" fill="#bfdbfe" text-anchor="middle">Outbox Consumer</text>
  <text x="340" y="400" font-size="10.5" fill="#94a3b8" text-anchor="middle">+ Balance Projector</text>

  <rect x="40" y="360" width="160" height="62" rx="10" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
  <text x="120" y="386" font-size="12" font-weight="700" fill="#6ee7b7" text-anchor="middle">account_balance_view</text>
  <text x="120" y="404" font-size="9.5" fill="#a7f3d0" text-anchor="middle">read model</text>

  <rect x="265" y="458" width="150" height="44" rx="10" fill="#450a0a" stroke="#f87171" stroke-width="2"/>
  <text x="340" y="485" font-size="12.5" font-weight="700" fill="#fca5a5" text-anchor="middle">DLQ topic</text>

  <!-- projection arrows (leftward) -->
  <line x1="700" y1="391" x2="664" y2="391" stroke="#fbbf24" stroke-width="2.5" marker-end="url(#aAmber)"/>
  <line x1="470" y1="391" x2="444" y2="391" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#aBlue)"/>
  <line x1="240" y1="391" x2="204" y2="391" stroke="#34d399" stroke-width="2.5" marker-end="url(#aGreen)"/>
  <text x="312" y="350" font-size="10" fill="#86efac" text-anchor="middle">version-conditional upsert</text>
  <line x1="340" y1="428" x2="340" y2="456" stroke="#f87171" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#aRed)"/>
  <text x="356" y="446" font-size="10" fill="#fca5a5">poison message</text>

  <!-- read path back up to application -->
  <path d="M 120 360 C 120 250, 320 212, 416 190" fill="none" stroke="#34d399" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#aGreen)"/>
  <text x="150" y="300" font-size="11" fill="#6ee7b7">read</text>

  <text x="600" y="524" font-size="10.5" fill="#64748b" text-anchor="middle">Dashed = in-process call (no I/O) or async read &#183; events flow out of the write side and loop back into the read model</text>
</svg>
