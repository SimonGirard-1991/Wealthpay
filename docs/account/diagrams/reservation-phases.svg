<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="470" viewBox="0 0 1040 470" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="aGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#34d399"/></marker>
    <marker id="aRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#f87171"/></marker>
    <marker id="aAmber" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#fbbf24"/></marker>
  </defs>

  <rect width="1040" height="470" fill="url(#bg)"/>
  <text x="40" y="50" font-size="24" font-weight="700" fill="#38bdf8">Reservation Lifecycle &#8212; Two-Phase Hold</text>
  <line x1="40" y1="64" x2="1000" y2="64" stroke="#334155" stroke-width="1"/>

  <circle cx="80" cy="250" r="11" fill="#64748b"/>

  <line x1="92" y1="250" x2="164" y2="250" stroke="#fbbf24" stroke-width="2.5" marker-end="url(#aAmber)"/>
  <text x="128" y="240" font-size="12" font-weight="600" fill="#fde68a" text-anchor="middle">Reserve</text>

  <path d="M 372 228 C 470 200, 500 152, 594 152" fill="none" stroke="#34d399" stroke-width="2.5" marker-end="url(#aGreen)"/>
  <text x="486" y="178" font-size="13" font-weight="700" fill="#6ee7b7" text-anchor="middle">Capture &#183; commit</text>

  <path d="M 372 272 C 470 300, 500 348, 594 348" fill="none" stroke="#f87171" stroke-width="2.5" marker-end="url(#aRed)"/>
  <text x="486" y="338" font-size="13" font-weight="700" fill="#fca5a5" text-anchor="middle">Cancel &#183; rollback</text>

  <rect x="172" y="213" width="200" height="74" rx="13" fill="#422006" stroke="#f59e0b" stroke-width="2.5" filter="url(#sh)"/>
  <text x="272" y="246" font-size="19" font-weight="700" fill="#fde68a" text-anchor="middle">RESERVED</text>
  <text x="272" y="268" font-size="12" fill="#fcd34d" text-anchor="middle">hold placed</text>
  <text x="272" y="312" font-size="12" fill="#94a3b8" text-anchor="middle">ledger unchanged &#183; available &#8722;= amount</text>

  <rect x="600" y="118" width="230" height="70" rx="13" fill="#14532d" stroke="#22c55e" stroke-width="2.5" filter="url(#sh)"/>
  <text x="715" y="150" font-size="18" font-weight="700" fill="#bbf7d0" text-anchor="middle">CAPTURED</text>
  <text x="715" y="171" font-size="12" fill="#86efac" text-anchor="middle">settled</text>
  <text x="850" y="148" font-size="12" fill="#cbd5e1">ledger &#8722;= amount</text>
  <text x="850" y="166" font-size="12" fill="#94a3b8">cannot be cancelled</text>

  <rect x="600" y="318" width="230" height="70" rx="13" fill="#450a0a" stroke="#f87171" stroke-width="2.5" filter="url(#sh)"/>
  <text x="715" y="350" font-size="18" font-weight="700" fill="#fca5a5" text-anchor="middle">CANCELED</text>
  <text x="715" y="371" font-size="12" fill="#fecaca" text-anchor="middle">released</text>
  <text x="850" y="348" font-size="12" fill="#cbd5e1">available += amount</text>
  <text x="850" y="366" font-size="12" fill="#94a3b8">cannot be captured</text>

  <rect x="30" y="406" width="980" height="48" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="52" y="435" font-size="13" fill="#94a3b8">Ledger = initial + credits &#8722; debits &#8722; captures</text>
  <text x="452" y="435" font-size="13" fill="#94a3b8">Reserved = &#931; active holds</text>
  <text x="720" y="435" font-size="13" font-weight="700" fill="#6ee7b7">Available = Ledger &#8722; Reserved</text>
</svg>
