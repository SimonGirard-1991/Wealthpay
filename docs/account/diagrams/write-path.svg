<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="560" viewBox="0 0 1320 560" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="aGray" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/></marker>
    <marker id="aGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#34d399"/></marker>
    <marker id="aAmber" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#fbbf24"/></marker>
    <marker id="aBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#60a5fa"/></marker>
  </defs>

  <rect width="1320" height="560" fill="url(#bg)"/>
  <text x="40" y="50" font-size="24" font-weight="700" fill="#38bdf8">Request End-to-End</text>
  <text x="40" y="74" font-size="13" fill="#94a3b8">Write is acknowledged synchronously; the read model is updated asynchronously.</text>

  <!-- WRITE panel -->
  <rect x="30" y="92" width="1260" height="208" rx="14" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <text x="48" y="116" font-size="12.5" font-weight="700" fill="#475569">WRITE</text>

  <!-- TX highlight -->
  <rect x="362" y="138" width="438" height="118" rx="12" fill="#38bdf8" fill-opacity="0.05" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="581" y="132" font-size="11" font-weight="700" fill="#fbbf24" text-anchor="middle">single DB transaction &#183; idempotency &#8594; load &#8594; handle &#8594; append event + outbox</text>

  <!-- aggregate aside -->
  <rect x="600" y="150" width="150" height="44" rx="10" fill="#312e81" stroke="#a5b4fc" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="675" y="170" font-size="12.5" font-weight="700" fill="#e0e7ff" text-anchor="middle">Account</text>
  <text x="675" y="186" font-size="10" fill="#c7d2fe" text-anchor="middle">handle() &#183; no I/O</text>

  <!-- write nodes -->
  <rect x="55" y="206" width="115" height="64" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="112" y="234" font-size="13" font-weight="700" fill="#bfdbfe" text-anchor="middle">Client</text>
  <text x="112" y="252" font-size="10" fill="#93c5fd" text-anchor="middle">REST / HTTP</text>

  <rect x="200" y="206" width="150" height="64" rx="10" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
  <text x="275" y="234" font-size="12.5" font-weight="700" fill="#bfdbfe" text-anchor="middle">REST Controller</text>
  <text x="275" y="252" font-size="10" fill="#94a3b8" text-anchor="middle">DTO &#8594; command</text>

  <rect x="380" y="198" width="180" height="80" rx="10" fill="#1e293b" stroke="#818cf8" stroke-width="2"/>
  <text x="470" y="224" font-size="12.5" font-weight="700" fill="#c7d2fe" text-anchor="middle">Application Service</text>
  <text x="470" y="242" font-size="9.5" fill="#94a3b8" text-anchor="middle">idempotency guard &#183; load</text>
  <text x="470" y="258" font-size="9.5" fill="#94a3b8" text-anchor="middle">@Transactional</text>

  <rect x="610" y="198" width="180" height="80" rx="10" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
  <text x="700" y="226" font-size="13" font-weight="700" fill="#6ee7b7" text-anchor="middle">PostgreSQL</text>
  <text x="700" y="245" font-size="9.5" fill="#a7f3d0" text-anchor="middle">event_store + outbox</text>
  <text x="700" y="261" font-size="9.5" fill="#64748b" text-anchor="middle">optimistic version</text>

  <rect x="840" y="206" width="140" height="64" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="910" y="234" font-size="12.5" font-weight="700" fill="#fde68a" text-anchor="middle">Debezium</text>
  <text x="910" y="252" font-size="10" fill="#94a3b8" text-anchor="middle">reads WAL</text>

  <rect x="1020" y="206" width="120" height="64" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="1080" y="234" font-size="13" font-weight="700" fill="#fde68a" text-anchor="middle">Kafka</text>
  <text x="1080" y="252" font-size="9.5" fill="#94a3b8" text-anchor="middle">AccountEvent</text>

  <!-- write arrows -->
  <line x1="170" y1="238" x2="196" y2="238" stroke="#94a3b8" stroke-width="2" marker-end="url(#aGray)"/>
  <line x1="350" y1="238" x2="376" y2="238" stroke="#94a3b8" stroke-width="2" marker-end="url(#aGray)"/>
  <line x1="470" y1="198" x2="600" y2="178" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#aGray)"/>
  <line x1="560" y1="238" x2="606" y2="238" stroke="#94a3b8" stroke-width="2" marker-end="url(#aGray)"/>
  <line x1="790" y1="238" x2="836" y2="238" stroke="#fbbf24" stroke-width="2" marker-end="url(#aAmber)"/>
  <line x1="980" y1="238" x2="1016" y2="238" stroke="#fbbf24" stroke-width="2" marker-end="url(#aAmber)"/>

  <!-- async connector -->
  <line x1="1080" y1="270" x2="1080" y2="380" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#aAmber)"/>
  <text x="660" y="326" font-size="13" font-weight="700" fill="#fbbf24" text-anchor="middle">Asynchronous &#8212; the read model lags the write (a read right after a write may not see it yet)</text>

  <!-- READ panel -->
  <rect x="30" y="384" width="1260" height="150" rx="14" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <text x="48" y="408" font-size="12.5" font-weight="700" fill="#475569">READ</text>

  <rect x="1020" y="430" width="120" height="64" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="1080" y="458" font-size="12" font-weight="700" fill="#fde68a" text-anchor="middle">Kafka topic</text>
  <text x="1080" y="476" font-size="9.5" fill="#94a3b8" text-anchor="middle">AccountEvent</text>

  <rect x="720" y="424" width="210" height="76" rx="10" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
  <text x="825" y="452" font-size="12.5" font-weight="700" fill="#bfdbfe" text-anchor="middle">Consumer + Projector</text>
  <text x="825" y="470" font-size="9.5" fill="#94a3b8" text-anchor="middle">idempotent (event version)</text>

  <rect x="470" y="430" width="200" height="64" rx="10" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
  <text x="570" y="456" font-size="12" font-weight="700" fill="#6ee7b7" text-anchor="middle">account_balance_view</text>
  <text x="570" y="474" font-size="9.5" fill="#a7f3d0" text-anchor="middle">balance &#183; reserved &#183; status</text>

  <rect x="250" y="430" width="170" height="64" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="335" y="456" font-size="12" font-weight="700" fill="#bfdbfe" text-anchor="middle">GET /accounts/{id}</text>
  <text x="335" y="474" font-size="9.5" fill="#93c5fd" text-anchor="middle">from read model</text>

  <rect x="60" y="430" width="120" height="64" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="120" y="466" font-size="13" font-weight="700" fill="#bfdbfe" text-anchor="middle">Client</text>

  <!-- read arrows (leftward) -->
  <line x1="1020" y1="462" x2="934" y2="462" stroke="#60a5fa" stroke-width="2" marker-end="url(#aBlue)"/>
  <line x1="720" y1="462" x2="674" y2="462" stroke="#34d399" stroke-width="2" marker-end="url(#aGreen)"/>
  <text x="697" y="420" font-size="9.5" fill="#86efac" text-anchor="middle">upsert WHERE version &lt; new</text>
  <line x1="470" y1="462" x2="424" y2="462" stroke="#94a3b8" stroke-width="2" marker-end="url(#aGray)"/>
  <line x1="250" y1="462" x2="184" y2="462" stroke="#94a3b8" stroke-width="2" marker-end="url(#aGray)"/>
</svg>
