global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: [ 'alertname', 'instance' ]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - receiver: critical
      matchers:
        - severity="critical"
      repeat_interval: 1h
      continue: true

inhibit_rules:
  - source_matchers:
      - alertname="InstanceDown"
    target_matchers:
      - severity=~"warning|critical"
      - alertname!="InstanceDown"
    equal: [ 'instance' ]

receivers:
  - name: default
    webhook_configs:
      - url: http://alertmanager-discord:9096
        send_resolved: true

  - name: critical
    webhook_configs:
      - url: http://alertmanager-discord:9096/critical
        send_resolved: true
