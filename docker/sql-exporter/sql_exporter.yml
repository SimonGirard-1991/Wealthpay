---
# sql_exporter — top-level config. Pins the target DB and points at
# collector files. Owned by the Wealthpay local stack.
#
# WHY THIS TOOL EXISTS IN THE STACK: postgres_exporter deprecated its
# `--extend.query-path` custom-query feature in v0.13.0 (June 2023) and
# explicitly redirects users to sql_exporter for gap-filling queries.
# See docker-compose.local.yml `sql-exporter` service comment for the
# full rationale. Scope here is kept deliberately narrow: two queries
# that fill genuine built-in-collector gaps (pg_stat_wal, pg_stat_io).
# Do not grow this into a second general-purpose exporter.
#
# LOCAL-ONLY CREDENTIALS: the DSN below hard-codes the monitoring/
# monitoring credentials from docker/postgres/bootstrap/02-monitoring-role.sql.
# When lifting this to a non-local environment, switch to a file-sourced
# DSN (sql_exporter supports environment-variable expansion) backed by
# Docker/K8s secrets or Vault — do NOT copy this file verbatim.

global:
  # Cap queries so a pathological query on the DB side can't starve the
  # scrape pipeline. Must be < Prometheus scrape_timeout (default 10s).
  scrape_timeout: 8s
  # Don't re-run a collector more often than this even if Prometheus
  # scrapes faster. Aligns with Prometheus global scrape_interval (15s)
  # so we don't pay for queries whose output nobody will see.
  min_interval: 15s
  # Single DB, a handful of lightweight queries — one connection is
  # enough. Keeps the footprint on the monitored server minimal. Each
  # collector file registered below MUST cite a specific postgres-exporter
  # coverage gap in its header comment; if a future collector cannot, it
  # does not belong in this exporter.
  #
  # Concurrency note: this is not only a footprint choice — with
  # max_connections=1 and enable_ping=true below, every scrape runs
  # serially as PING -> pg_stat_wal -> pg_stat_io -> pg_stat_statements_info
  # -> pg_stat_statements_tracked -> pg_replication_slots inside one
  # scrape_timeout window. All five current queries are sub-millisecond
  # (the slot query reads an in-memory view bounded by N slots; this
  # stack runs N=1) so the 8s budget is ample, but additional collector
  # queries compound serially, not in parallel — re-evaluate
  # max_connections before adding a sixth, especially if the new query
  # touches a heavy view (pg_stat_activity at high connection counts is
  # the usual gotcha).
  max_connections: 1

target:
  # DSN driver prefix must match the name used by sql_exporter's
  # registered driver. `postgresql://` is the canonical form for the
  # pgx-backed driver.
  data_source_name: "postgresql://monitoring:monitoring@postgres:5432/wealthpay?sslmode=disable&connect_timeout=5"
  # Runs SELECT 1 as the first operation of every scrape. On connection
  # or auth failure it short-circuits the scrape so Prometheus sees `up`
  # flip to 0 on a dead DB, instead of only flipping when a collector
  # query happens to error. Prometheus synthesizes `up` from the scrape
  # itself either way — this just makes the failure signal faster and
  # more specific (a DB reachability problem vs a query-specific one).
  enable_ping: true
  collectors:
    - pg_wal_io
    - pg_stat_statements_info
    - pg_replication_slots

collector_files:
  # Explicit list, NOT a glob. Each collector file must cite a specific
  # postgres-exporter coverage gap in its header; a glob would silently
  # onboard rogue files dropped into the mount without that review.
  # Add entries here consciously, in the same order as the `collectors:`
  # list above so the execution order reads the same from both sides.
  - wal-io.collector.yml
  - pg-stat-statements-info.collector.yml
  - replication.collector.yml
