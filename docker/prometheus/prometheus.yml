global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: [ 'alertmanager:9093' ]

scrape_configs:
  - job_name: 'wealthpay'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'host.docker.internal:8080' ]

  - job_name: 'alertmanager'
    static_configs:
      - targets: [ 'alertmanager:9093' ]

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: [ 'postgres-exporter:9187' ]

  - job_name: 'sql-exporter'
    # NOTE: sql-exporter has its own min_interval=15s cache (see
    # docker/sql-exporter/sql_exporter.yml). Tightening this job's
    # scrape_interval below 15s will return cached values, not fresher
    # data — adjust both sides in lockstep if you need higher resolution.
    #
    # scrape_timeout pinned explicitly (Prometheus default is 10s) so the
    # lockstep contract with sql-exporter's own scrape_timeout: 8s is
    # visible from this file alone. Keep this > sql-exporter's internal
    # budget so the exporter fails a slow query first, instead of
    # Prometheus cutting the scrape mid-flight.
    scrape_timeout: 10s
    static_configs:
      - targets: [ 'sql-exporter:9399' ]
